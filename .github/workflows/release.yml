name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Build embedded web UI
        run: |
          pnpm --dir web build
          pnpm --dir web sync:embed

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/package
          suffix=""
          if [ "${GOOS}" = "windows" ]; then
            suffix=".exe"
          fi
          go build -trimpath -o "dist/package/popupd${suffix}" ./cmd/popupd
          go build -trimpath -o "dist/package/popup-mcp${suffix}" ./cmd/popup-mcp
          cp README.md LICENSE NOTICE CHANGELOG.md dist/package/

      - name: Package tar.gz artifact
        if: matrix.archive == 'tar.gz'
        run: |
          artifact="askuser-popup-${{ matrix.goos }}-${{ matrix.goarch }}"
          mv dist/package "dist/${artifact}"
          tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"

      - name: Package zip artifact
        if: matrix.archive == 'zip'
        run: |
          artifact="askuser-popup-${{ matrix.goos }}-${{ matrix.goarch }}"
          mv dist/package "dist/${artifact}"
          (cd dist && zip -r "${artifact}.zip" "${artifact}")

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: askuser-popup-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/askuser-popup-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate artifact checksums
        run: |
          cd dist
          sha256sum askuser-popup-* > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
