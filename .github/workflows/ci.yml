name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Check Go coverage threshold
        run: ./scripts/check_go_coverage.sh

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Run Biome check
        run: pnpm --dir web check

      - name: Run ESLint
        run: pnpm --dir web lint

      - name: Run web coverage tests
        run: pnpm --dir web test:coverage

      - name: Build embedded web UI
        run: |
          pnpm --dir web build
          pnpm --dir web sync:embed

      - name: Verify embedded assets are committed
        run: git diff --exit-code -- internal/webui/dist

  e2e:
    name: Browser e2e
    runs-on: ubuntu-latest
    needs:
      - go
      - web
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --dir web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --dir web test:e2e
